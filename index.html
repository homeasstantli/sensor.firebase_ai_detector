<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainable Webhook AI Switch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.4"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; margin: 0; padding: 20px; }
        #status { font-size: 1.3em; margin: 15px; color: #00ffcc; min-height: 40px; }
        .control-panel { background: #333; padding: 15px; border-radius: 8px; max-width: 500px; margin: 15px auto; }
        input, button { padding: 10px; font-size: 1em; margin: 5px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        button { background: #00ffcc; color: #222; }
        .bg-btn { background: #ff9900; color: black; }
        .train-btn { background: #ff3366; color: white; }
        #video-container { display: flex; justify-content: center; margin-top: 15px; position: relative; width: 400px; height: 300px; margin-left: auto; margin-right: auto; }
        video { border: 4px solid #00ffcc; border-radius: 8px; transform: scaleX(-1); background: #111; width: 400px; height: 300px; }
        #video-overlay { position: absolute; top: 4px; left: 4px; width: 392px; height: 292px; background: rgba(0,0,0,0.9); border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #confidence-box { margin-top: 15px; background: #2a2a2a; padding: 10px; border-radius: 6px; display: inline-block; min-width: 200px; }
    </style>
</head>
<body>

    <h1>Trainable Web AI (Native Webhook)</h1>
    <div id="status">Status: Waiting to start...</div>

    <div class="control-panel">
        <button class="bg-btn" id="bg-btn">🖼️ Set Empty Background</button>
        <br><br>
        <input type="text" id="object-name" placeholder="e.g., me, hand, phone">
        <button class="train-btn" id="train-btn">📸 Train Object</button>
    </div>

    <div id="video-container">
        <div id="video-overlay">
            <button id="activate-btn" style="font-size: 1.2em; padding: 15px;">🎥 START LIVE CAMERA FEED</button>
        </div>
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div id="confidence-box">
        <div id="confidence-list">No objects trained yet...</div>
    </div>

    <script type="module">
        // --- HOME ASSISTANT WEBHOOK SETTINGS ---
        const HA_IP = "192.168.1.206:8123"; 
        const WEBHOOK_ID = "my_secret_wall_tape_trigger"; 

        const video = document.getElementById('webcam');
        const statusDiv = document.getElementById('status');
        const videoOverlay = document.getElementById('video-overlay');
        const confidenceList = document.getElementById('confidence-list');
        
        let model, classifier, lastSentObject = "", lastSentTime = 0, isSystemReady = false;

        document.getElementById('train-btn').addEventListener('click', trainCurrentFrame);
        document.getElementById('bg-btn').addEventListener('click', captureBackgroundWithCountdown);
        document.getElementById('activate-btn').addEventListener('click', initApp);

        async function initApp() {
            statusDiv.innerText = "⚡ Loading AI Engine...";
            try {
                classifier = knnClassifier.create();
                model = await mobilenet.load();
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300, facingMode: "user" }, audio: false });
                video.srcObject = stream;
                await video.play();
                videoOverlay.style.display = 'none';
                statusDiv.innerText = "👉 Camera Connected! Step back and click 'Set Empty Background'.";
                isSystemReady = true;
            } catch (err) {
                statusDiv.innerText = "🔒 Camera Error. Check your browser permissions.";
            }
        }

        function captureBackgroundWithCountdown() {
            if (!isSystemReady) return;
            let countdown = 3;
            const timer = setInterval(async () => {
                countdown--;
                if (countdown > 0) { statusDiv.innerText = `⚠️ Capturing background in ${countdown}...`; } 
                else {
                    clearInterval(timer);
                    for (let i = 0; i < 15; i++) {
                        const img = tf.browser.fromPixels(video);
                        classifier.addExample(model.infer(img, true), 'background');
                        img.dispose();
                        await new Promise(r => setTimeout(r, 50));
                    }
                    statusDiv.innerText = "✅ Background set! Train your target object now.";
                    sendWebhookNotification("background");
                    startPredictionLoop();
                }
            }, 1000);
        }

        async function trainCurrentFrame() {
            const label = document.getElementById('object-name').value.trim().toLowerCase();
            if (!label || label === 'background') return;
            statusDiv.innerText = `Training "${label}"...`;
            const img = tf.browser.fromPixels(video);
            classifier.addExample(model.infer(img, true), label);
            img.dispose();
            statusDiv.innerText = `Trained: ${label}`;
        }

        async function startPredictionLoop() {
            while (true) {
                if (classifier.getNumClasses() > 0) {
                    const img = tf.browser.fromPixels(video);
                    try {
                        const result = await classifier.predictClass(model.infer(img, true));
                        const detectedObject = result.label;
                        const confidence = result.confidences[detectedObject];

                        if (confidence >= 0.85) {
                            statusDiv.innerText = `Seeing: ${detectedObject} (${Math.round(confidence * 100)}%)`;
                            sendWebhookNotification(detectedObject);
                        }
                    } catch (e) {}
                    img.dispose();
                }
                await tf.nextFrame();
                await new Promise(r => setTimeout(r, 400));
            }
        }

        async function sendWebhookNotification(objectName) {
            let currentTime = Date.now();
            if (objectName !== lastSentObject || (currentTime - lastSentTime > 3000)) {
                lastSentObject = objectName;
                lastSentTime = currentTime;
                try {
                    await fetch(`http://${HA_IP}/api/webhook/${WEBHOOK_ID}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ state: objectName })
                    });
                    console.log("Webhook fired:", objectName);
                } catch (error) {
                    console.error("Webhook network error:", error);
                }
            }
        }
    </script>
</body>
</html>

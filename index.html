<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wall Tape AI Switch</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.4/dist/knn-classifier.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            margin-bottom: 5px;
            font-size: 24px;
            text-align: center;
        }
        .config-box {
            width: 100%;
            max-width: 400px;
            background-color: #2a2a2a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #444;
        }
        .config-box label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .config-box input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: monospace;
            outline: none;
            box-sizing: border-box;
        }
        #btn-start {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #555;
            color: #aaa;
            border: none;
            border-radius: 12px;
            cursor: not-allowed;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: block;
            transition: all 0.3s ease;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background-color: #000;
            margin-bottom: 15px;
        }
        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
            object-fit: cover;
            background: #000;
            min-height: 200px;
        }
        #status {
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 20px;
            background-color: #333;
            min-width: 150px;
            text-align: center;
        }
        #debug-console {
            width: 100%;
            max-width: 400px;
            background: #000;
            color: #00ff00;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            border-radius: 6px;
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 10px;
            box-sizing: border-box;
            text-align: left;
            border: 1px solid #333;
        }
        .setup-container {
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: white;
            outline: none;
        }
        #btn-add-class {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background-color: #ff9800;
            color: black;
            cursor: pointer;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
        }
        .train-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            touch-action: manipulation;
            display: flex;
            justify-content: space-between;
        }
        .detected { background-color: #2e7d32 !important; }
        .clear { background-color: #c62828 !important; }
    </style>
</head>
<body>

    <h1>Wall Tape AI Switch</h1>
    
    <div class="config-box">
        <label for="webhook-id-input">Home Assistant Webhook ID</label>
        <input type="text" id="webhook-id-input" placeholder="e.g., wall_tape_ai_trigger">
    </div>

    <div class="config-box">
        <label for="option-name-input">AI Option Name to Send</label>
        <input type="text" id="option-name-input" placeholder="e.g., me">
    </div>
    
    <button id="btn-start" disabled>Loading AI Core...</button>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="setup-container">
        <input type="text" id="class-name-input" placeholder="Type new item name...">
        <button id="btn-add-class">Add Thing</button>
    </div>

    <div id="training-buttons" class="button-container">
        <button class="train-btn" style="background-color: #1976d2;" id="btn-me">
            <span>Train "<span class="lbl-me">me</span>"</span> <span id="count-me">0</span>
        </button>
        <button class="train-btn" style="background-color: #616161;" id="btn-background">
            <span>Train "background"</span> <span id="count-background">0</span>
        </button>
    </div>

    <div id="status">System booting...</div>
    <div id="debug-console">Console initialized.</div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const videoElement = document.getElementById('webcam');
            const statusElement = document.getElementById('status');
            const debugConsole = document.getElementById('debug-console');
            const trainingButtonsContainer = document.getElementById('training-buttons');
            const classNameInput = document.getElementById('class-name-input');
            const btnAddClass = document.getElementById('btn-add-class');
            const btnStart = document.getElementById('btn-start');
            const webhookIdInput = document.getElementById('webhook-id-input');
            const optionNameInput = document.getElementById('option-name-input');
            const labelMeSpans = document.querySelectorAll('.lbl-me');
            
            let net = null;
            let classifier = null;
            let lastSentState = "";
            let counts = { me: 0, background: 0 };

            const buttonColors = ["#e91e63", "#9c27b0", "#009688", "#4caf50", "#ff5722"];
            let colorIndex = 0;

            const BASE_HA_URL = "http://192.168.1.206:8123/api/webhook/";

            function logDebug(msg) {
                console.log(msg);
                debugConsole.innerText = msg + "\n" + debugConsole.innerText;
            }

            // Load webhook settings from phone memory
            const savedWebhookId = localStorage.getItem('ha_webhook_id') || 'wall_tape_ai_trigger';
            webhookIdInput.value = savedWebhookId;

            // Load custom name from phone memory
            const savedOptionName = localStorage.getItem('ha_option_name') || 'me';
            optionNameInput.value = savedOptionName;
            updateButtonLabels(savedOptionName);

            // Save webhook changes instantly
            webhookIdInput.addEventListener('input', () => {
                localStorage.setItem('ha_webhook_id', webhookIdInput.value.trim());
            });

            // Save option name changes instantly and update button UI text
            optionNameInput.addEventListener('input', () => {
                const cleanedName = optionNameInput.value.trim().toLowerCase().replace(/[^a-z0-9]/g, '_') || 'me';
                localStorage.setItem('ha_option_name', cleanedName);
                updateButtonLabels(cleanedName);
            });

            function updateButtonLabels(newName) {
                labelMeSpans.forEach(span => {
                    span.innerText = newName;
                });
            }

            try {
                classifier = knnClassifier.create();
                logDebug("AI Engine loaded.");
            } catch(e) {
                logDebug("Engine build error: " + e.message);
            }

            async function setupWebcam() {
                logDebug("Requesting phone lens access...");
                const constraints = { 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                };
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    videoElement.srcObject = stream;
                    return new Promise((resolve) => {
                        videoElement.onloadedmetadata = () => {
                            videoElement.play().then(() => {
                                logDebug("Camera successfully active.");
                                resolve();
                            }).catch(e => {
                                logDebug("Playback holding: " + e.message);
                                resolve();
                            });
                        };
                    });
                } catch (err) {
                    logDebug("Camera failed: " + err.message);
                    statusElement.innerText = "Camera error.";
                    throw err;
                }
            }

            function captureFrame() {
                if (!net) return null;
                return tf.tidy(() => {
                    const rawImg = tf.browser.fromPixels(videoElement);
                    const batchedImg = rawImg.resizeBilinear([224, 224]).expandDims(0);
                    return net.predict(batchedImg);
                });
            }

            function addExample(label) {
                if (!net || !classifier) return;
                try {
                    const activation = captureFrame();
                    if (activation) {
                        // If training the primary 'me' slot, we route it based on custom input
                        const activeLabel = (label === 'me') ? (optionNameInput.value.trim().toLowerCase() || 'me') : label;
                        
                        classifier.addExample(activation, activeLabel);
                        
                        counts[label] = (counts[label] || 0) + 1;
                        const counterSpan = document.getElementById(`count-${label}`);
                        if (counterSpan) counterSpan.innerText = counts[label];
                        logDebug(`Trained "${activeLabel}" (${counts[label]})`);
                    }
                } catch (err) {
                    logDebug("Training glitch: " + err.message);
                }
            }

            document.getElementById('btn-me').addEventListener('click', () => addExample('me'));
            document.getElementById('btn-background').addEventListener('click', () => addExample('background'));

            function createCustomTrainingButton(label) {
                if (counts[label] !== undefined) return; 
                counts[label] = 0;

                const btn = document.createElement('button');
                btn.className = 'train-btn';
                btn.style.backgroundColor = buttonColors[colorIndex % buttonColors.length];
                colorIndex++;

                btn.innerHTML = `<span>Train "${label}"</span> <span id="count-${label}">0</span>`;
                btn.addEventListener('click', () => addExample(label));
                
                trainingButtonsContainer.appendChild(btn);
            }

            btnAddClass.addEventListener('click', () => {
                const name = classNameInput.value.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');
                if (name) {
                    createCustomTrainingButton(name);
                    classNameInput.value = "";
                }
            });

            async function sendToHomeAssistant(label) {
                if (label === lastSentState) return;
                
                const currentWebhookId = webhookIdInput.value.trim() || 'wall_tape_ai_trigger';
                const fullUrl = BASE_HA_URL + currentWebhookId;
                
                try {
                    const response = await fetch(fullUrl, {
                        method: "POST",
                        mode: "cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ option: label })
                    });
                    if (response.ok) {
                        lastSentState = label;
                        logDebug(`Webhook [${currentWebhookId}] Sent -> ${label}`);
                    } else {
                        logDebug(`HA Error response: ${response.status}`);
                    }
                } catch (error) {
                    logDebug(`Network send error: ${error.message}`);
                }
            }

            async function initEngineInBackground() {
                try {
                    logDebug("Pre-fetching AI layers...");
                    statusElement.innerText = "Downloading Model...";
                    
                    net = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mobilenet_v1_0.25_224/model.json');
                    
                    logDebug("AI loaded! Button unlocked.");
                    statusElement.innerText = "AI Ready! Unlock camera.";
                    
                    btnStart.disabled = false;
                    btnStart.innerText = "Tap to Start Camera";
                    btnStart.style.backgroundColor = "#4caf50";
                    btnStart.style.color = "#ffffff";
                    btnStart.style.cursor = "pointer";
                    btnStart.style.boxShadow = "0 4px 15px rgba(76, 175, 80, 0.4)";
                } catch (err) {
                    logDebug("Background download failed: " + err.message);
                }
            }

            btnStart.addEventListener('click', async () => {
                btnStart.style.display = 'none';
                
                try {
                    await setupWebcam();
                    statusElement.innerText = "System running! Tap buttons.";

                    setInterval(async () => {
                        if (classifier && classifier.getNumClasses() > 0) {
                            try {
                                const activation = captureFrame();
                                if (activation) {
                                    const result = await classifier.predictClass(activation);
                                    const label = result.label;
                                    
                                    statusElement.innerText = `Detected: ${label.toUpperCase()}`;
                                    
                                    const primaryName = optionNameInput.value.trim().toLowerCase() || 'me';
                                    statusElement.className = (label === primaryName) ? "detected" : "clear";

                                    sendToHomeAssistant(label);
                                }
                            } catch (loopErr) {
                                console.error(loopErr);
                            }
                        }
                    }, 400);
                } catch (err) {
                    logDebug("Camera connection failed: " + err.message);
                }
            });

            initEngineInBackground();
        });
    </script>
</body>
</html>

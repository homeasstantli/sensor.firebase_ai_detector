<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Tape AI Switch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background-color: #000;
        }
        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }
        #status {
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 20px;
            background-color: #333;
            min-width: 150px;
            text-align: center;
        }
        .detected {
            background-color: #2e7d32 !important;
        }
        .clear {
            background-color: #c62828 !important;
        }
    </style>
</head>
<body>

    <h1>Wall Tape AI Switch</h1>
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    <div id="status">Loading AI Model...</div>

    <script>
        const videoElement = document.getElementById('webcam');
        const statusElement = document.getElementById('status');
        
        let net;
        const classifier = knnClassifier.create();
        let lastSentState = "";

        // Change this if your Home Assistant IP changes
        const HA_URL = "http://192.168.1.206:8123/api/services/input_select/select_option";

        async function setupWebcam() {
            return new Promise((resolve, reject) => {
                const navigatorAny = navigator;
                navigator.getUserMedia = navigator.getUserMedia ||
                    navigatorAny.webkitGetUserMedia || navigatorAny.mozGetUserMedia || navigatorAny.msGetUserMedia;
                if (navigator.getUserMedia) {
                    navigator.getUserMedia({ video: { facingMode: 'user' } },
                        stream => {
                            videoElement.srcObject = stream;
                            videoElement.addEventListener('loadeddata', () => resolve(), false);
                        },
                        error => reject());
                } else {
                    reject();
                }
            });
        }

        async function sendToHomeAssistant(label) {
            // Only send a network request if the state actually changes
            if (label === lastSentState) return;

            try {
                const response = await fetch(HA_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        entity_id: "input_select.wall_tape_switch",
                        option: label
                    })
                });
                
                if (response.ok) {
                    console.log(`Successfully updated HA to: ${label}`);
                    lastSentState = label;
                } else {
                    console.error("HA responded with an error status code.");
                }
            } catch (error) {
                console.error("Network error trying to connect to Home Assistant:", error);
            }
        }

        async function app() {
            statusElement.innerText = "Loading MobileNet...";
            net = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mobilenet_v1_0.25_224/model.json');
            statusElement.innerText = "Camera starting...";
            
            await setupWebcam();
            statusElement.innerText = "AI Active - Scanning Room";

            // Temporary continuous loop to evaluate camera frames
            setInterval(async () => {
                if (classifier.getNumClasses() > 0) {
                    const img = tf.browser.fromPixels(videoElement);
                    const activation = net.predict(img.expandDims(0));
                    const result = await classifier.predictClass(activation);
                    
                    const label = result.label;
                    
                    if (label === "me") {
                        statusElement.innerText = "Detected: Me";
                        statusElement.className = "detected";
                        sendToHomeAssistant("me");
                    } else {
                        statusElement.innerText = "Clear: Background";
                        statusElement.className = "clear";
                        sendToHomeAssistant("background");
                    }
                    
                    img.dispose();
                }
            }, 500);
        }

        // Initialize the tracking application
        app();
    </script>
</body>
</html>

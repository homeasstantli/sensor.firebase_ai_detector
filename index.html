<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainable Firebase AI App</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.4"></script>

    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; margin: 0; padding: 20px; }
        #status { font-size: 1.3em; margin: 15px; color: #00ffcc; min-height: 40px; }
        .control-panel { background: #333; padding: 15px; border-radius: 8px; max-width: 500px; margin: 15px auto; }
        input, button { padding: 10px; font-size: 1em; margin: 5px; border-radius: 5px; border: none; }
        button { background: #00ffcc; font-weight: bold; cursor: pointer; }
        button:hover { background: #00e6b8; }
        .bg-btn { background: #ff9900; color: black; }
        .train-btn { background: #ff3366; color: white; }
        
        .slider-container { background: #444; padding: 12px; border-radius: 5px; margin-top: 10px; }
        .slider-container label { font-weight: bold; display: block; margin-bottom: 5px; color: #00ffcc; }
        input[type=range] { width: 80%; cursor: pointer; }

        #video-container { display: flex; justify-content: center; margin-top: 15px; position: relative; width: 400px; height: 300px; margin-left: auto; margin-right: auto; }
        video { border: 4px solid #00ffcc; border-radius: 8px; transform: scaleX(-1); background: #111; width: 400px; height: 300px; }
        
        /* Direct interaction layer to satisfy Chrome security requirements */
        #video-overlay {
            position: absolute; top: 4px; left: 4px; width: 392px; height: 292px;
            background: rgba(0,0,0,0.9); border-radius: 6px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; cursor: pointer;
        }
        #video-overlay p { margin: 10px; font-weight: bold; font-size: 1.1em; color: #fff; text-align: center; }
        #activate-btn { background: #00ffcc; color: #222; padding: 12px 24px; border-radius: 5px; font-size: 1.2em; font-weight: bold; border: none; cursor: pointer; }

        #confidence-box { margin-top: 15px; background: #2a2a2a; padding: 10px; border-radius: 6px; display: inline-block; min-width: 200px; border: 1px solid #444; }
        .conf-item { display: flex; justify-content: space-between; padding: 4px 10px; font-family: monospace; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>Trainable Web AI (Firebase Powered)</h1>
    
    <div id="status">Status: Waiting for user interaction...</div>

    <div class="control-panel">
        <h3>1. Set Your Environment</h3>
        <button class="bg-btn" id="bg-btn">🖼️ Set Empty Background</button>
        <hr style="border-color: #554; margin: 15px 0;">
        
        <h3>2. Adjust Sensitivity Threshold</h3>
        <div class="slider-container">
            <label for="threshold-slider">Required Match Confidence: <span id="threshold-val">85</span>%</label>
            <input type="range" id="threshold-slider" min="10" max="100" value="85">
        </div>
        <hr style="border-color: #554; margin: 15px 0;">

        <h3>3. Train Custom Object</h3>
        <input type="text" id="object-name" placeholder="e.g., wallet, phone, keys">
        <button class="train-btn" id="train-btn">📸 Train Object Image</button>
    </div>

    <div id="video-container">
        <div id="video-overlay">
            <p>Click below to grant Chrome permission</p>
            <button id="activate-btn">🎥 Start Live Camera Feed</button>
        </div>
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div>
        <div id="confidence-box">
            <div style="font-weight: bold; color: #aaa; margin-bottom: 5px;">Live Engine Diagnostics:</div>
            <div id="confidence-list">No objects trained yet...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHwQZrRUYrgpAv1_JscdHvHBXCMH-1r8c",
            authDomain: "ha-object-detector.firebaseapp.com",
            projectId: "ha-object-detector",
            storageBucket: "ha-object-detector.firebasestorage.app",
            messagingSenderId: "1091277100158",
            appId: "1:1091277100158:web:4c5df0cf63caaf3c40b42f",
            measurementId: "G-TTFESRVCP3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const video = document.getElementById('webcam');
        const statusDiv = document.getElementById('status');
        const thresholdSlider = document.getElementById('threshold-slider');
        const thresholdVal = document.getElementById('threshold-val');
        const videoOverlay = document.getElementById('video-overlay');
        const confidenceList = document.getElementById('confidence-list');
        
        let model, classifier;
        let lastSentObject = "";
        let lastSentTime = 0;
        let isSystemReady = false;
        let currentThreshold = 0.85; 

        document.getElementById('train-btn').addEventListener('click', trainCurrentFrame);
        document.getElementById('bg-btn').addEventListener('click', captureBackgroundWithCountdown);
        document.getElementById('activate-btn').addEventListener('click', initApp);
        videoOverlay.addEventListener('click', initApp);

        thresholdSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            thresholdVal.innerText = val;
            currentThreshold = val / 100; 
        });

        async function initApp() {
            statusDiv.innerText = "⚡ Initializing TensorFlow core models...";
            try {
                if (!classifier) classifier = knnClassifier.create();
                if (!model) model = await mobilenet.load();
                
                statusDiv.innerText = "🛰️ Requesting Chrome media hardware access...";
                
                // Chrome optimization constraints
                const constraints = {
                    video: {
                        width: 400,
                        height: 300,
                        facingMode: "user"
                    },
                    audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // Forces Chrome to bypass async pipeline pause errors
                video.setAttribute('autoplay', '');
                video.setAttribute('playsinline', '');
                video.setAttribute('muted', '');
                
                await video.play();
                
                videoOverlay.style.display = 'none';
                statusDiv.innerText = "👉 Stream active. Click 'Set Empty Background' to begin calibration.";
                isSystemReady = true;
            } catch (err) {
                statusDiv.innerText = "🔒 Chrome blocked camera access. Click the lock icon in the URL bar and select ALLOW.";
                console.error("Camera Error: ", err);
            }
        }

        function captureBackgroundWithCountdown() {
            if (!isSystemReady) { alert("Please start the camera first!"); return; }
            
            classifier.clearAllClasses();
            let countdown = 3;
            statusDiv.innerText = `⚠️ Clear the frame! Capturing background in ${countdown}...`;
            
            const timer = setInterval(async () => {
                countdown--;
                if (countdown > 0) {
                    statusDiv.innerText = `⚠️ Clear the frame! Capturing background in ${countdown}...`;
                } else {
                    clearInterval(timer);
                    statusDiv.innerText = "📸 Capturing background now...";
                    
                    for (let i = 0; i < 15; i++) {
                        const img = tf.browser.fromPixels(video);
                        const logits = model.infer(img, true);
                        classifier.addExample(logits, 'background');
                        img.dispose();
                        await new Promise(r => setTimeout(r, 50));
                    }
                    
                    statusDiv.innerText = "✅ Background set! You can step in and train your objects.";
                    saveToFirebase("background", "active");
                    startPredictionLoop();
                }
            }, 1000);
        }

        async function trainCurrentFrame() {
            const label = document.getElementById('object-name').value.trim().toLowerCase();
            if (!label) { alert("Please type a name first!"); return; }
            if (label === 'background') { alert("Use the orange button for background!"); return; }

            statusDiv.innerText = `Training "${label}"... Keep object stable.`;
            const img = tf.browser.fromPixels(video);
            const logits = model.infer(img, true);
            classifier.addExample(logits, label);
            img.dispose();
            
            statusDiv.innerText = `Added training sample for: ${label}`;
            saveToFirebase(label, "just_trained");
        }

        async function startPredictionLoop() {
            if (window.predictionLoopRunning) return;
            window.predictionLoopRunning = true;

            while (true) {
                if (classifier.getNumClasses() > 0) {
                    const img = tf.browser.fromPixels(video);
                    const logits = model.infer(img, true);
                    
                    try {
                        const result = await classifier.predictClass(logits);
                        const detectedObject = result.label;
                        const confidence = result.confidences[detectedObject];

                        let listHtml = "";
                        for (const [className, score] of Object.entries(result.confidences)) {
                            let color = score >= currentThreshold ? "#00ffcc" : "#fff";
                            listHtml += `<div class="conf-item" style="color: ${color}"><span>${className}:</span><span>${Math.round(score * 100)}%</span></div>`;
                        }
                        confidenceList.innerHTML = listHtml;

                        if (confidence >= currentThreshold) {
                            statusDiv.innerText = `Seeing: ${detectedObject} (${Math.round(confidence * 100)}%)`;
                            saveToFirebase(detectedObject, "active");
                        } else {
                            statusDiv.innerText = `Uncertain... Closest match is ${detectedObject} (${Math.round(confidence * 100)}%)`;
                        }
                    } catch (e) { console.error(e); }
                    img.dispose();
                }
                await tf.nextFrame();
                await new Promise(r => setTimeout(r, 400));
            }
        }

        async function saveToFirebase(objectName, objectStatus) {
            let currentTime = Date.now();
            if (objectName !== lastSentObject || (currentTime - lastSentTime > 4000)) {
                lastSentObject = objectName;
                lastSentTime = currentTime;

                try {
                    await setDoc(doc(db, "smart_home", "detector"), {
                        last_detected_object: objectName,
                        status: objectStatus,
                        timestamp: currentTime
                    });
                    console.log("Firebase Database Updated:", objectName);
                } catch (error) {
                    console.error("Firebase Database write error:", error);
                }
            }
        }
    </script>
</body>
</html>

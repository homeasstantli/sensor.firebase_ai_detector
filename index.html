<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wall Tape AI Switch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background-color: #000;
        }
        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }
        #status {
            margin: 15px 0;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 20px;
            background-color: #333;
            min-width: 150px;
            text-align: center;
        }
        #debug-console {
            width: 100%;
            max-width: 400px;
            background: #000;
            color: #00ff00;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            border-radius: 6px;
            max-height: 80px;
            overflow-y: auto;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        .setup-container {
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: white;
            outline: none;
        }
        #btn-add-class {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background-color: #ff9800;
            color: black;
            cursor: pointer;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
        }
        .train-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            touch-action: manipulation;
            display: flex;
            justify-content: space-between;
            -webkit-tap-highlight-color: transparent;
        }
        .train-btn:active {
            opacity: 0.6;
        }
        .detected { background-color: #2e7d32 !important; }
        .clear { background-color: #c62828 !important; }
    </style>
</head>
<body>

    <h1>Wall Tape AI Switch</h1>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="setup-container">
        <input type="text" id="class-name-input" placeholder="Type new item name...">
        <button id="btn-add-class">Add Thing</button>
    </div>

    <div id="training-buttons" class="button-container">
        <button class="train-btn" style="background-color: #1976d2;" id="btn-me">
            <span>Train "me"</span> <span id="count-me">0</span>
        </button>
        <button class="train-btn" style="background-color: #616161;" id="btn-background">
            <span>Train "background"</span> <span id="count-background">0</span>
        </button>
    </div>

    <div id="status">Initializing system...</div>
    <div id="debug-console">Console ready...</div>

    <script>
        const videoElement = document.getElementById('webcam');
        const statusElement = document.getElementById('status');
        const debugConsole = document.getElementById('debug-console');
        const trainingButtonsContainer = document.getElementById('training-buttons');
        const classNameInput = document.getElementById('class-name-input');
        const btnAddClass = document.getElementById('btn-add-class');
        
        let net;
        const classifier = knnClassifier.create();
        let lastSentState = "";
        let counts = { me: 0, background: 0 };

        const buttonColors = ["#e91e63", "#9c27b0", "#009688", "#4caf50", "#ff5722"];
        let colorIndex = 0;

        const HA_URL = "http://192.168.1.206:8123/api/services/input_select/select_option";

        function logDebug(msg) {
            console.log(msg);
            debugConsole.innerText = msg + "\n" + debugConsole.innerText;
        }

        async function setupWebcam() {
            logDebug("Requesting camera access...");
            const constraints = { 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 224 },
                    height: { ideal: 224 }
                } 
            };
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                return new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        logDebug("Camera playing successfully.");
                        resolve();
                    };
                });
            } catch (err) {
                logDebug("Camera Error: " + err.message);
                statusElement.innerText = "Camera Error! Check settings.";
                throw err;
            }
        }

        function addExample(label) {
            if (!net) {
                logDebug("Error: Model not loaded yet.");
                return;
            }
            try {
                const img = tf.browser.fromPixels(videoElement);
                const activation = net.predict(img.expandDims(0));
                classifier.addExample(activation, label);
                
                counts[label] = (counts[label] || 0) + 1;
                const counterSpan = document.getElementById(`count-${label}`);
                if (counterSpan) counterSpan.innerText = counts[label];
                
                img.dispose();
                logDebug(`Trained "${label}" (${counts[label]})`);
            } catch (err) {
                logDebug("Training crash: " + err.message);
            }
        }

        // Attach touch/click listeners to core buttons cleanly
        document.getElementById('btn-me').addEventListener('click', () => addExample('me'));
        document.getElementById('btn-background').addEventListener('click', () => addExample('background'));

        function createCustomTrainingButton(label) {
            if (counts[label] !== undefined) return; 
            counts[label] = 0;

            const btn = document.createElement('button');
            btn.className = 'train-btn';
            btn.style.backgroundColor = buttonColors[colorIndex % buttonColors.length];
            colorIndex++;

            btn.innerHTML = `<span>Train "${label}"</span> <span id="count-${label}">0</span>`;
            btn.addEventListener('click', () => addExample(label));
            
            trainingButtonsContainer.appendChild(btn);
            logDebug(`Added custom button: ${label}`);
        }

        btnAddClass.addEventListener('click', () => {
            const name = classNameInput.value.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');
            if (name) {
                createCustomTrainingButton(name);
                classNameInput.value = "";
            }
        });

        async function sendToHomeAssistant(label) {
            if (label === lastSentState) return;
            try {
                const response = await fetch(HA_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        entity_id: "input_select.wall_tape_switch",
                        option: label
                    })
                });
                if (response.ok) {
                    lastSentState = label;
                    logDebug(`HA Updated: ${label}`);
                }
            } catch (error) {
                console.error("HA Sync error:", error);
            }
        }

        async function app() {
            try {
                logDebug("Downloading TensorFlow model...");
                statusElement.innerText = "Loading AI Engine...";
                net = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mobilenet_v1_0.25_224/model.json');
                
                logDebug("Model loaded. Connecting webcam...");
                await setupWebcam();
                
                statusElement.innerText = "AI Ready! Tap buttons.";
                logDebug("System running cleanly.");

                setInterval(async () => {
                    if (classifier.getNumClasses() > 0) {
                        const img = tf.browser.fromPixels(videoElement);
                        const activation = net.predict(img.expandDims(0));
                        const result = await classifier.predictClass(activation);
                        
                        const label = result.label;
                        statusElement.innerText = `Detected: ${label.toUpperCase()}`;
                        statusElement.className = (label === "me") ? "detected" : "clear";

                        sendToHomeAssistant(label);
                        img.dispose();
                    }
                }, 400);
            } catch (err) {
                logDebug("App init failed: " + err.message);
            }
        }

        app();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Tape AI Switch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background-color: #000;
        }
        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }
        #status {
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 20px;
            background-color: #333;
            min-width: 150px;
            text-align: center;
        }
        .detected {
            background-color: #2e7d32 !important;
        }
        .clear {
            background-color: #c62828 !important;
        }
        .setup-container {
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: white;
        }
        #btn-add-class {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background-color: #ff9800;
            color: black;
            cursor: pointer;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
        }
        .train-btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
            -webkit-user-select: none;
            user-select: none;
            text-align: left;
            display: flex;
            justify-content: space-between;
        }
        .train-btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>Wall Tape AI Switch</h1>
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="setup-container">
        <input type="text" id="class-name-input" placeholder="Type new item name...">
        <button id="btn-add-class">Add Thing</button>
    </div>

    <div id="training-buttons" class="button-container"></div>

    <div id="status">Loading AI Model...</div>

    <script>
        const videoElement = document.getElementById('webcam');
        const statusElement = document.getElementById('status');
        const trainingButtonsContainer = document.getElementById('training-buttons');
        const classNameInput = document.getElementById('class-name-input');
        const btnAddClass = document.getElementById('btn-add-class');
        
        let net;
        const classifier = knnClassifier.create();
        let lastSentState = "";
        let counts = {};

        // Colors to cycle through for custom buttons
        const buttonColors = ["#1976d2", "#616161", "#e91e63", "#9c27b0", "#009688"];
        let colorIndex = 0;

        const HA_URL = "http://192.168.1.206:8123/api/services/input_select/select_option";

        async function setupWebcam() {
            return new Promise((resolve, reject) => {
                const navigatorAny = navigator;
                navigator.getUserMedia = navigator.getUserMedia ||
                    navigatorAny.webkitGetUserMedia || navigatorAny.mozGetUserMedia || navigatorAny.msGetUserMedia;
                if (navigator.getUserMedia) {
                    navigator.getUserMedia({ video: { facingMode: 'user' } },
                        stream => {
                            videoElement.srcObject = stream;
                            videoElement.addEventListener('loadeddata', () => resolve(), false);
                        },
                        error => reject());
                } else {
                    reject();
                }
            });
        }

        // Adds a camera frame sample into the AI memory
        function addExample(label) {
            if (!net) return;
            const img = tf.browser.fromPixels(videoElement);
            const activation = net.predict(img.expandDims(0));
            classifier.addExample(activation, label);
            
            // Increment and display the training count
            counts[label]++;
            document.getElementById(`count-${label}`).innerText = counts[label];
            
            img.dispose();
        }

        // Dynamically build a new button on screen for a classification item
        function createTrainingButton(label) {
            if (counts[label] !== undefined) return; // Prevent duplicates
            
            counts[label] = 0;

            const btn = document.createElement('button');
            btn.className = 'train-btn';
